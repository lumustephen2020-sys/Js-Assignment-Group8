<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoppers - Checkout</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>🛍️ Shoppers</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count" class="cart-badge">0</span></a></li>
                    <li><a href="checkout.html" class="active">Checkout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="checkout-section">
            <h2>Checkout</h2>
            
            <div id="checkout-cart-summary" class="checkout-summary">
                
            </div>

            <form id="checkout-form" class="checkout-form">
                <h3>Delivery Information</h3>
                
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name">
                    <span class="error-message" id="name-error"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com">
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+256 XXX XXXXXX">
                    <span class="error-message" id="phone-error"></span>
                </div>

                <div class="form-group">
                    <label for="address">Delivery Address *</label>
                    <textarea id="address" name="address" placeholder="Enter your full address" rows="3"></textarea>
                    <span class="error-message" id="address-error"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" id="place-order-btn" class="btn-primary">Place Order</button>
                    <button type="button" id="clear-cart-btn" class="btn-secondary">Clear Cart</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Shop Uganda. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
