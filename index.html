<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoppers - Home</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    
    <header>
        <div class="header-container">
            <h1>🛍️ Shoppers</h1>
            <nav aria-label="Main navigation">
                <ul>
                    <li><a href="index.html" class="active" aria-current="page">Home</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count" class="cart-badge">0</span></a></li>
                    <li><a href="checkout.html">Checkout</a></li>
                </ul>
            </nav>
        <div class ="header-search">
        <input type="search"placeholder="search products">
        <button type="submit">search</button>
        </div>
        </div>
      </header>

    <main>
        <section class="filters-section">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search products...">
                <button id="search-btn">🔍 Search</button>
            </div>
            
            <div class="category-filters">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="Electronics"> Electronics</button>
                <button class="category-btn" data-category="Fashion"> Fashion</button>
                <button class="category-btn" data-category="Books"> Books</button>
            </div>
        </section>

        <section class="products-section">
            <h2>Our Products& Services</h2>
            <div id="products-container" class="products-grid">
                
            </div>
        </section>
    </main>

    <footer>

    </footer>

    <script src="js/script.js"></script>
</body>
</html>
